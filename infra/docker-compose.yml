services:
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    ports:
      - '8080:8080'
    environment:
      PORT: '8080'

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    ports:
      - '3333:3333'
    environment:
      NEXT_PUBLIC_API_URL: 'http://api:8080'
    depends_on:
      - api
