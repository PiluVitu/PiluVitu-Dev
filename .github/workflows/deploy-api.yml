name: Deploy API (Cloud Run)

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # necessário para Workload Identity Federation

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Guard: só roda quando o projeto GCP estiver configurado.
    # Enquanto a API estiver exposta via Cloudflare Tunnel local, este job é skipado.
    if: ${{ vars.GCP_PROJECT_ID != '' }}

    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      AR_REPOSITORY: ${{ vars.AR_REPOSITORY }}
      SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build image
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPOSITORY}/api:${GITHUB_SHA}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          docker build \
            -f apps/api/Dockerfile \
            -t "${IMAGE}" \
            .

      - name: Push image
        run: docker push "${IMAGE}"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.IMAGE }}
          flags: >-
            --allow-unauthenticated
            --min-instances=0
            --max-instances=3
            --cpu=1
            --memory=256Mi
            --concurrency=80
            --timeout=30s
            --port=8080

      - name: Show service URL
        run: |
          URL=$(gcloud run services describe "${SERVICE_NAME}" \
            --region="${GCP_REGION}" \
            --format='value(status.url)')
          echo "Deployed: ${URL}"
          echo "API_URL=${URL}" >> "$GITHUB_STEP_SUMMARY"
